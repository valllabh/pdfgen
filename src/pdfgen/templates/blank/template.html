<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="pdfgen:name" content="blank">
<meta name="pdfgen:description" content="Minimal blank template. One title and one body. Good starting point for custom templates.">
<meta name="pdfgen:variable" content="title" data-type="string" data-required="true">
<meta name="pdfgen:variable" content="body" data-type="string" data-default="">
<title>{{ title }}</title>
<style>
  @page { size: A4; margin: 20mm; }
  body { font-family: "Helvetica Neue", Arial, sans-serif; line-height: 1.6; color: #222; }
  h1 { font-size: 22pt; }
  .body { white-space: pre-wrap; }
</style>
</head>
<body>
  <h1>{{ title }}</h1>
  {% if body %}<div class="body">{{ body }}</div>{% endif %}
</body>
</html>
